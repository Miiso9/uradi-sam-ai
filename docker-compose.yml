version: '3.8'

services:
  api:
    build: .
    container_name: uradisam_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      - ollama
      - redis
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - AI_MODEL=${AI_MODEL:-llava}
      - SAFETY_MODEL=${SAFETY_MODEL:-llama3}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - REDIS_URL=redis://redis:6379/0
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
    volumes:
      - ./app:/code/app
      - ./chroma_db:/code/chroma_db

  worker:
    build: .
    container_name: uradisam_worker
    command: celery -A app.workers.celery_app worker --loglevel=info -c 2
    depends_on:
      - ollama
      - redis
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - AI_MODEL=${AI_MODEL:-llava}
      - SAFETY_MODEL=${SAFETY_MODEL:-llama3}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - REDIS_URL=redis://redis:6379/0
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
    volumes:
      - ./app:/code/app
      - ./scripts:/code/scripts
      - ./data:/code/data
      - ./chroma_db:/code/chroma_db

  redis:
    image: redis:7-alpine
    container_name: uradisam_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  ollama:
    image: ollama/ollama:latest
    container_name: uradisam_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
  redis_data: